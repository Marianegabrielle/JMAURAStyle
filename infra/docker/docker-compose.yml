services:
  postgres:
    image: postgres:15
    container_name: jmaurastyle_db
    environment:
      POSTGRES_USER: jmaura
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: jmaurastyle
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jmaurastyle_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: jmaurastyle_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: jmaurastyle_backend
    volumes:
      - ../../backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://jmaura:pass123@postgres:5432/jmaurastyle
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
