services:
  postgres:
    image: postgres:15
    container_name: jmaurastyle_db
    environment:
      POSTGRES_USER: jmaura
      POSTGRES_PASSWORD: jmaura2026
      POSTGRES_DB: jmaurastyle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jmaurastyle_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: jmaurastyle_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: jmaurastyle_backend
    volumes:
      - ../../backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://jmaura:jmaura2026@postgres:5432/jmaurastyle
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin2026
      MINIO_BUCKET: jmaurastyle
      SECRET_KEY: jmaurastyle_super_secret_key_2026_never_share
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ANTHROPIC_API_KEY: your_key_here
      OPENWEATHER_API_KEY: your_key_here
    depends_on:
      - postgres
      - redis
      - minio

  

volumes:
  postgres_data:
  minio_data: