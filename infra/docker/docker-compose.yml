version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: jmaurastyle_db
    environment:
      POSTGRES_USER: jmaura
      POSTGRES_PASSWORD: jmaura2026
      POSTGRES_DB: jmaurastyle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: jmaurastyle_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: jmaurastyle_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  minio_data:
